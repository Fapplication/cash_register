<!-- Receipts.html — Receipt Management page fragment -->
<div id="receipts-page">

  <div id="receipt-list-view">
    <div class="card">
      <div class="card-head">
        <div class="card-title">All Receipts</div>
        <div class="card-actions">
          <input type="text" id="receipt-search" placeholder="Search receipt no…"
            style="width:180px;font-size:12px;padding:6px 10px;border:1px solid #CBD5E1;border-radius:7px"
            oninput="filterReceipts()">
          <select id="receipt-biz-filter" style="font-size:12px;padding:6px 10px;border:1px solid #CBD5E1;border-radius:7px" onchange="filterReceipts()">
            <option value="">All Businesses</option>
          </select>
          <button class="btn sm" onclick="exportReceiptsCsv()"><i class="ti ti-download"></i> CSV</button>
        </div>
      </div>

      <div class="table-wrap">
        <table id="receipts-table">
          <thead>
            <tr>
              <th>Receipt No.</th>
              <th>Transaction ID</th>
              <th>Business</th>
              <th>Cashier</th>
              <th>Date & Time</th>
              <th>Payment</th>
              <th>Subtotal</th>
              <th>VAT</th>
              <th>Total</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="receipts-body">
            <tr><td colspan="10" style="text-align:center;padding:32px;color:#94A3B8">
              <div class="spinner" style="margin:0 auto"></div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Receipt detail view -->
  <div id="receipt-detail-view" style="display:none">
    <div style="margin-bottom:14px">
      <button class="btn sm" onclick="backToList()"><i class="ti ti-arrow-left"></i> Back to Receipts</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start">

      <!-- Detail info -->
      <div class="card" id="receipt-detail-info">
        <div class="loading-overlay"><div class="spinner"></div> Loading receipt…</div>
      </div>

      <!-- Printable receipt -->
      <div>
        <div class="receipt-sheet" id="receipt-printable">
          <div class="loading-overlay"><div class="spinner"></div></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn primary" style="flex:1;justify-content:center" onclick="window.print()">
            <i class="ti ti-printer"></i> Print
          </button>
          <button class="btn" style="flex:1;justify-content:center" onclick="downloadReceiptPdf()">
            <i class="ti ti-file-type-pdf"></i> PDF
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let _allReceipts = [];
let _receiptsLoaded = false;

// ── Load receipts ─────────────────────────────────────────
(function loadReceipts() {
  google.script.run
    .withSuccessHandler(function(rows) {
      _allReceipts = rows || [];
      _receiptsLoaded = true;

      // Populate business filter
      const bizSel = document.getElementById('receipt-biz-filter');
      const bizNames = [...new Set(_allReceipts.map(r => r.businessName).filter(Boolean))];
      bizNames.forEach(n => bizSel.innerHTML += `<option value="${n}">${n}</option>`);

      renderReceiptsTable(_allReceipts);
    })
    .withFailureHandler(function(err) {
      document.getElementById('receipts-body').innerHTML =
        `<tr><td colspan="10"><div class="alert danger"><i class="ti ti-alert-circle"></i>${err.message}</div></td></tr>`;
    })
    .getTransactions(TOKEN, {});
})();

function fmt(n) { return (parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function payBadge(p) { return p==='Cash'?'green':p==='Bank Transfer'?'blue':'amber'; }

function renderReceiptsTable(rows) {
  const tbody = document.getElementById('receipts-body');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><i class="ti ti-receipt-off"></i><p>No receipts found.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `<tr>
    <td><span class="mono" style="color:#185FA5;cursor:pointer;font-weight:600"
      onclick="openReceipt('${r.receiptNo}')">${r.receiptNo}</span></td>
    <td class="mono text-xs text-muted">${r.id}</td>
    <td>${r.businessName||r.businessId}</td>
    <td>${r.cashierName||r.cashierId}</td>
    <td class="text-muted text-xs">${(r.date||'').replace('T',' ').slice(0,16)}</td>
    <td><span class="badge ${payBadge(r.paymentType)}">${r.paymentType}</span></td>
    <td>ETB ${fmt(r.subtotal)}</td>
    <td>ETB ${fmt(r.tax)}</td>
    <td style="font-weight:700">ETB ${fmt(r.total)}</td>
    <td>
      <button class="btn sm" onclick="openReceipt('${r.receiptNo}')"><i class="ti ti-eye"></i></button>
    </td>
  </tr>`).join('');
}

function filterReceipts() {
  const q   = document.getElementById('receipt-search').value.toLowerCase();
  const biz = document.getElementById('receipt-biz-filter').value;
  const filtered = _allReceipts.filter(r =>
    (!q   || (r.receiptNo||'').toLowerCase().includes(q) || (r.id||'').toLowerCase().includes(q)) &&
    (!biz || (r.businessName||'') === biz)
  );
  renderReceiptsTable(filtered);
}

function openReceipt(receiptNo) {
  document.getElementById('receipt-list-view').style.display   = 'none';
  document.getElementById('receipt-detail-view').style.display = 'block';

  document.getElementById('receipt-detail-info').innerHTML   = '<div class="loading-overlay"><div class="spinner"></div> Loading…</div>';
  document.getElementById('receipt-printable').innerHTML     = '<div class="loading-overlay"><div class="spinner"></div></div>';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.ok) {
        document.getElementById('receipt-detail-info').innerHTML =
          `<div class="alert danger"><i class="ti ti-alert-circle"></i>${res.message}</div>`;
        return;
      }
      renderReceiptDetail(res);
    })
    .withFailureHandler(function(err) {
      document.getElementById('receipt-detail-info').innerHTML =
        `<div class="alert danger"><i class="ti ti-alert-circle"></i>${err.message}</div>`;
    })
    .getReceiptDetail(TOKEN, receiptNo);
}

function renderReceiptDetail(res) {
  const tx = res.transaction;
  const items = res.items || [];

  // Detail info card
  document.getElementById('receipt-detail-info').innerHTML = `
    <div class="card-head"><div class="card-title">Transaction Details</div>
      <span class="badge green mono">${tx.receiptNo}</span>
    </div>
    <div class="form-grid cols-2" style="font-size:12.5px;gap:14px">
      <div><div class="text-xs text-muted mb-4">Transaction ID</div><div class="mono">${tx.id}</div></div>
      <div><div class="text-xs text-muted mb-4">Receipt No.</div><div class="mono font-bold">${tx.receiptNo}</div></div>
      <div><div class="text-xs text-muted mb-4">Business</div><div>${tx.businessName}</div></div>
      <div><div class="text-xs text-muted mb-4">TIN</div><div class="mono">${tx.businessTin}</div></div>
      <div><div class="text-xs text-muted mb-4">Cashier</div><div>${tx.cashierName}</div></div>
      <div><div class="text-xs text-muted mb-4">Payment</div>
        <span class="badge ${tx.paymentType==='Cash'?'green':tx.paymentType==='Bank Transfer'?'blue':'amber'}">${tx.paymentType}</span>
      </div>
      <div><div class="text-xs text-muted mb-4">Date & Time</div><div>${(tx.date||'').replace('T',' ').slice(0,19)}</div></div>
      <div><div class="text-xs text-muted mb-4">Status</div><span class="badge green">Completed</span></div>
    </div>
    <div class="divider"></div>
    <div class="card-title mb-12" style="font-size:12.5px">Line Items</div>
    <table>
      <thead><tr><th>Item</th><th>Qty</th><th>Unit Price</th><th>VAT</th><th>Line Total</th></tr></thead>
      <tbody>${items.map(i=>`<tr>
        <td>${i.itemName}</td>
        <td>${i.qty}</td>
        <td>ETB ${fmt(i.unitPrice)}</td>
        <td>ETB ${fmt(i.lineVat)}</td>
        <td style="font-weight:600">ETB ${fmt(i.lineTotal)}</td>
      </tr>`).join('')}</tbody>
      <tfoot>
        <tr style="border-top:2px solid #E2E8F0">
          <td colspan="4" style="text-align:right;font-weight:600;padding:8px 10px">Grand Total</td>
          <td style="font-weight:700;font-size:14px;padding:8px 10px">ETB ${fmt(tx.total)}</td>
        </tr>
      </tfoot>
    </table>`;

  // Printable receipt
  document.getElementById('receipt-printable').innerHTML = `
    <div class="receipt-header">
      <div class="receipt-biz">${(tx.businessName||'').toUpperCase()}</div>
      <div class="receipt-meta">TIN: ${tx.businessTin}</div>
      <div class="receipt-meta">${tx.businessAddr}</div>
      <div style="margin:8px 0"><span class="badge blue" style="font-size:10px">OFFICIAL RECEIPT</span></div>
      <div class="mono" style="font-size:11px">${tx.receiptNo}</div>
      <div class="text-xs text-muted">${(tx.date||'').replace('T',' ').slice(0,19)}</div>
    </div>
    <div class="divider"></div>
    <table style="width:100%;font-size:11.5px;border-collapse:collapse">
      <thead><tr style="border-bottom:1px solid #E2E8F0">
        <th style="padding:4px 0;font-size:10px;text-align:left;color:#64748B">Description</th>
        <th style="padding:4px 0;font-size:10px;text-align:center;color:#64748B">Qty</th>
        <th style="padding:4px 0;font-size:10px;text-align:right;color:#64748B">Amount</th>
      </tr></thead>
      <tbody>${items.map(i=>`<tr>
        <td style="padding:5px 0;font-size:11px">${i.itemName}</td>
        <td style="text-align:center;font-size:11px">${i.qty}</td>
        <td style="text-align:right;font-size:11px">ETB ${fmt(i.lineTotal)}</td>
      </tr>`).join('')}</tbody>
    </table>
    <div class="divider"></div>
    <div class="receipt-row text-sm"><span class="text-muted">Subtotal</span><span>ETB ${fmt(tx.subtotal)}</span></div>
    <div class="receipt-row text-sm"><span class="text-muted">VAT</span><span>ETB ${fmt(tx.tax)}</span></div>
    <div class="receipt-total-row">TOTAL PAID<span>ETB ${fmt(tx.total)}</span></div>
    <div style="text-align:center;font-size:11px;color:#64748B;margin-top:10px">
      Payment via ${tx.paymentType} · Cashier: ${tx.cashierName}
    </div>
    <div style="text-align:center;font-size:11px;color:#94A3B8;margin-top:6px">Thank you for your business!</div>`;
}

function backToList() {
  document.getElementById('receipt-list-view').style.display   = 'block';
  document.getElementById('receipt-detail-view').style.display = 'none';
}

function downloadReceiptPdf() {
  alert('PDF download requires server-side rendering. Integrate a PDF library (e.g. jsPDF) or use the Print → Save as PDF browser option.');
}

function exportReceiptsCsv() {
  if (!_allReceipts.length) { alert('No data to export.'); return; }
  const headers = ['ReceiptNo','TransactionID','Business','Cashier','Date','Payment','Subtotal','VAT','Total'];
  const rows = _allReceipts.map(r => [
    r.receiptNo, r.id, r.businessName, r.cashierName,
    (r.date||'').slice(0,19), r.paymentType, r.subtotal, r.tax, r.total
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => '"'+(c||'').toString().replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'receipts_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// Allow other pages (e.g. Dashboard) to open a receipt by receipt number
function openReceipt(rno) { openReceipt(rno); }
</script>
