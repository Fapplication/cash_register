<div id="login-view" class="row justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="col-md-4">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-4">
        <h4>Cash Registration Portal</h4>
        <p class="text-muted small">Sign in to your work account</p>
      </div>
      <div class="alert alert-danger d-none" id="login-error"></div>
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" id="login-username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="btn-login">Login</button>
      </form>
    </div>
  </div>
</div>
