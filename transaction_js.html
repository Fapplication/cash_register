<script>
let cart = [];
let allItems = [];

function initCashRegister() {
  document.getElementById('cashierName').innerText = App.user.fullName;
  loadItems();
  
  document.getElementById('itemSearch').oninput = (e) => {
    renderItems(e.target.value);
  };
}

function loadItems() {
  google.script.run
    .withSuccessHandler(items => {
      allItems = items;
      renderItems();
    })
    .getItemsByBusiness(App.user.businessId);
}

function renderItems(filter = '') {
  const tbody = document.getElementById('itemList');
  tbody.innerHTML = '';
  
  const filtered = allItems.filter(i => 
    i.ItemName.toLowerCase().includes(filter.toLowerCase()) || 
    i.ItemCode.toLowerCase().includes(filter.toLowerCase())
  );
  
  filtered.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${item.ItemCode}</td>
      <td>${item.ItemName}</td>
      <td>${item.UnitPrice.toFixed(2)}</td>
      <td><button class="btn btn-sm btn-primary" onclick="addToCart('${item.ItemID}')">Add</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function addToCart(itemId) {
  const item = allItems.find(i => i.ItemID === itemId);
  const existing = cart.find(c => c.itemId === itemId);
  
  if (existing) {
    existing.qty++;
    existing.amount = existing.qty * existing.price;
  } else {
    cart.push({
      itemId: item.ItemID,
      itemName: item.ItemName,
      qty: 1,
      price: item.UnitPrice,
      taxRate: item.TaxRate,
      amount: item.UnitPrice
    });
  }
  renderCart();
}

function renderCart() {
  const tbody = document.getElementById('cartList');
  tbody.innerHTML = '';
  
  let subtotal = 0;
  let tax = 0;
  
  cart.forEach((item, index) => {
    subtotal += item.amount;
    tax += item.amount * item.taxRate;
    
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${item.itemName}</td>
      <td><input type="number" class="form-control form-control-sm" value="${item.qty}" style="width: 60px" onchange="updateQty(${index}, this.value)"></td>
      <td>${item.price.toFixed(2)}</td>
      <td>${item.amount.toFixed(2)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="removeFromCart(${index})">×</button></td>
    `;
    tbody.appendChild(tr);
  });
  
  document.getElementById('subtotal').innerText = subtotal.toFixed(2);
  document.getElementById('taxTotal').innerText = tax.toFixed(2);
  document.getElementById('grandTotal').innerText = (subtotal + tax).toFixed(2);
}

function updateQty(index, qty) {
  if (qty <= 0) return removeFromCart(index);
  cart[index].qty = parseInt(qty);
  cart[index].amount = cart[index].qty * cart[index].price;
  renderCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  renderCart();
}

function completeSale() {
  if (cart.length === 0) return Swal.fire('Error', 'Cart is empty', 'warning');
  
  const btn = document.getElementById('completeSaleBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
  
  const saleData = {
    businessId: App.user.businessId,
    cashierId: App.user.userId,
    subtotal: parseFloat(document.getElementById('subtotal').innerText),
    tax: parseFloat(document.getElementById('taxTotal').innerText),
    total: parseFloat(document.getElementById('grandTotal').innerText),
    items: cart
  };
  
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showReceipt(res);
        cart = [];
        renderCart();
      } else {
        Swal.fire('Error', 'Failed to save transaction', 'error');
      }
      btn.disabled = false;
      btn.innerHTML = 'Complete Sale';
    })
    .processSale(saleData);
}

function showReceipt(res) {
  const preview = document.getElementById('receiptPreview');
  // Simple receipt generation
  preview.innerHTML = `
    <div class="text-center">
      <strong>${App.user.businessId}</strong><br>
      Receipt No: ${res.receiptNo}<br>
      Date: ${new Date(res.dateTime).toLocaleString()}
    </div>
    <hr>
    ${cart.map(i => `${i.itemName} x ${i.qty} @ ${i.price.toFixed(2)} = ${i.amount.toFixed(2)}`).join('<br>')}
    <hr>
    Subtotal: ${document.getElementById('subtotal').innerText}<br>
    Tax: ${document.getElementById('taxTotal').innerText}<br>
    <strong>TOTAL: ${document.getElementById('grandTotal').innerText}</strong>
  `;
  new bootstrap.Modal(document.getElementById('receiptModal')).show();
}
</script>
