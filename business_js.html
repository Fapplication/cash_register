<script>
function initBusinessDashboard() {
  loadBusinessProfile();
  loadBusinessItems();
}

function loadBusinessProfile() {
  google.script.run
    .withSuccessHandler(biz => {
      document.getElementById('bizName').innerText = biz.BusinessName;
      document.getElementById('bizTIN').innerText = biz.TIN;
      document.getElementById('bizAddress').innerText = biz.Address;
    })
    .getBusinessInfo(App.user.businessId);
}

function loadBusinessItems() {
  google.script.run
    .withSuccessHandler(items => {
      const tbody = document.getElementById('bizItemList');
      tbody.innerHTML = '';
      items.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.ItemCode}</td>
          <td>${item.ItemName}</td>
          <td>${item.UnitPrice.toFixed(2)}</td>
          <td>${(item.TaxRate * 100)}%</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary" onclick="editItem('${item.ItemID}')">Edit</button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.ItemID}')">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    })
    .getItemsByBusiness(App.user.businessId);
}

function showAddItemModal() {
  // Implementation for adding item modal
  Swal.fire({
    title: 'Add New Item',
    html: `
      <input id="swal-code" class="swal2-input" placeholder="Item Code">
      <input id="swal-name" class="swal2-input" placeholder="Item Name">
      <input id="swal-price" type="number" class="swal2-input" placeholder="Unit Price">
      <input id="swal-tax" type="number" class="swal2-input" placeholder="Tax Rate (e.g. 0.15)">
    `,
    showCancelButton: true,
    confirmButtonText: 'Save',
    preConfirm: () => {
      return {
        itemCode: document.getElementById('swal-code').value,
        itemName: document.getElementById('swal-name').value,
        unitPrice: parseFloat(document.getElementById('swal-price').value),
        taxRate: parseFloat(document.getElementById('swal-tax').value),
        businessId: App.user.businessId
      }
    }
  }).then((result) => {
    if (result.isConfirmed) {
      google.script.run
        .withSuccessHandler(() => {
          Swal.fire('Saved!', '', 'success');
          loadBusinessItems();
        })
        .addItem(result.value);
    }
  });
}
</script>
