<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cash Registration Portal — Login</title>
  <?!= include('Stylesheet'); ?>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#F1F5F9}
    .login-wrap{width:100%;max-width:420px;padding:24px}
    .login-card{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:36px 32px}
    .login-icon{width:54px;height:54px;border-radius:14px;background:#185FA5;
      display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;margin:0 auto 18px}
    .login-title{font-size:20px;font-weight:700;text-align:center;color:#1E293B;margin-bottom:4px}
    .login-subtitle{font-size:12.5px;color:#64748B;text-align:center;margin-bottom:24px}
    .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
    .role-btn{padding:10px 8px;border:1px solid #E2E8F0;border-radius:8px;text-align:center;
      cursor:pointer;font-size:11.5px;color:#475569;transition:all .14s;user-select:none}
    .role-btn i{font-size:20px;display:block;margin-bottom:4px}
    .role-btn:hover{border-color:#185FA5;background:#EFF6FF;color:#185FA5}
    .role-btn.selected{border-color:#185FA5;background:#EFF6FF;color:#185FA5;font-weight:600}
    .login-footer{text-align:center;margin-top:20px;font-size:11.5px;color:#94A3B8}
    #login-error{display:none}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-icon"><i class="ti ti-cash-register"></i></div>
    <div class="login-title">Cash Registration Portal</div>
    <div class="login-subtitle">Revenue Management System</div>

    <div style="font-size:11.5px;font-weight:500;color:#374151;margin-bottom:8px">Sign in as</div>
    <div class="role-grid" id="role-grid">
      <div class="role-btn selected" data-role="admin"><i class="ti ti-shield-check"></i>Administrator</div>
      <div class="role-btn" data-role="owner"><i class="ti ti-building-store"></i>Business Owner</div>
      <div class="role-btn" data-role="cashier"><i class="ti ti-device-desktop"></i>Cashier</div>
      <div class="role-btn" data-role="officer"><i class="ti ti-report-analytics"></i>Revenue Officer</div>
    </div>

    <div class="field mb-12">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" value="admin" autocomplete="username">
    </div>
    <div class="field mb-16">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <div class="alert danger" id="login-error">
      <i class="ti ti-alert-circle"></i>
      <span id="login-error-msg">Invalid credentials.</span>
    </div>

    <button class="btn primary w-full" style="justify-content:center;padding:10px;font-size:13px" onclick="attemptLogin()" id="login-btn">
      <i class="ti ti-login"></i> Sign in
    </button>

    <div class="login-footer">
      Default admin password: <strong>Admin@1234</strong>
    </div>
  </div>
</div>

<script>
// Pre-fill username based on role selection
const roleDefaults = { admin:'admin', owner:'owner', cashier:'cashier', officer:'officer' };
document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('username').value = roleDefaults[btn.dataset.role] || '';
    document.getElementById('password').value = '';
  });
});

// Enter key triggers login
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});

function attemptLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errBox   = document.getElementById('login-error');

  if (!username || !password) {
    showError('Please enter both username and password.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in…';
  errBox.style.display = 'none';

  google.script.run
    .withSuccessHandler(res => {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-login"></i> Sign in';
      if (res.ok) {
        // Store session token in sessionStorage
        sessionStorage.setItem('crp_token',    res.token);
        sessionStorage.setItem('crp_role',     res.role);
        sessionStorage.setItem('crp_name',     res.name);
        sessionStorage.setItem('crp_userId',   res.userId);
        // Redirect to dashboard
        google.script.run.withSuccessHandler(url => {
          window.location.href = url + '?page=dashboard';
        }).getScriptUrl();
      } else {
        showError(res.message || 'Login failed.');
      }
    })
    .withFailureHandler(err => {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-login"></i> Sign in';
      showError(err.message || 'Server error. Please try again.');
    })
    .doLogin(username, password);
}

function showError(msg) {
  const box = document.getElementById('login-error');
  document.getElementById('login-error-msg').textContent = msg;
  box.style.display = 'flex';
}

// If already logged in, redirect
(function() {
  const token = sessionStorage.getItem('crp_token');
  if (token) {
    google.script.run.withSuccessHandler(url => {
      window.location.href = url + '?page=dashboard';
    }).getScriptUrl();
  }
})();
</script>
</body>
</html>
