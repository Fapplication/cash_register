<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
  <div class="container-fluid">
    <span class="navbar-brand">CASH REGISTER</span>
    <div class="ms-auto">
      <span class="me-3">Cashier: <strong id="cashierName"></strong></span>
      <button class="btn btn-outline-danger btn-sm" onclick="App.logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <!-- Item Selection -->
    <div class="col-md-7">
      <div class="card p-3 mb-3">
        <h5>Item Search</h5>
        <input type="text" class="form-control mb-3" id="itemSearch" placeholder="Search by name or code...">
        <div class="table-responsive" style="max-height: 400px;">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Code</th>
                <th>Item</th>
                <th>Price</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="itemList"></tbody>
          </table>
        </div>
      </div>
    </div>
    
    <!-- Cart / Sale Summary -->
    <div class="col-md-5">
      <div class="card p-3">
        <h5>Selected Items</h5>
        <div class="table-responsive mb-3" style="min-height: 200px;">
          <table class="table table-sm">
            <thead>
              <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cartList"></tbody>
          </table>
        </div>
        <div class="border-top pt-3">
          <div class="d-flex justify-content-between mb-1">
            <span>Subtotal:</span>
            <span id="subtotal">0.00</span>
          </div>
          <div class="d-flex justify-content-between mb-1">
            <span>Tax:</span>
            <span id="taxTotal">0.00</span>
          </div>
          <div class="d-flex justify-content-between mb-3">
            <h4 class="mb-0">Grand Total:</h4>
            <h4 class="mb-0" id="grandTotal">0.00</h4>
          </div>
          <button class="btn btn-success btn-lg w-100" id="completeSaleBtn" onclick="completeSale()">
            Complete Sale
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Receipt Modal -->
<div class="modal fade" id="receiptModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Sale Completed</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <div id="receiptPreview" class="receipt-preview text-start"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" onclick="window.print()">Print Receipt</button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
