<style>
/* ── Reset & base ────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;font-size:14px;background:#F1F5F9;color:#1E293B}
a{color:#185FA5;text-decoration:none}
a:hover{text-decoration:underline}
img{max-width:100%}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* ── Layout shell ────────────────────────────────────────── */
.portal-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid #E2E8F0;
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 24px;height:52px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:20}
.page-content{flex:1;overflow-y:auto;padding:24px}

/* ── Sidebar pieces ──────────────────────────────────────── */
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:34px;height:34px;border-radius:8px;background:#185FA5;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.sb-logo-text{font-size:13px;font-weight:600;color:#1E293B;line-height:1.2}
.sb-logo-sub{font-size:10px;color:#94A3B8}
.sb-role{margin:10px 14px 4px;padding:5px 10px;border-radius:6px;
  background:#EFF6FF;color:#1D4ED8;font-size:11px;font-weight:500;
  display:flex;align-items:center;gap:6px}
.nav-section{padding:8px 0}
.nav-section-label{font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;color:#94A3B8;padding:6px 16px 3px}
.nav-link{display:flex;align-items:center;gap:9px;padding:8px 16px;
  cursor:pointer;font-size:12.5px;color:#475569;border-left:2px solid transparent;
  transition:background .12s,color .12s;user-select:none}
.nav-link:hover{background:#F8FAFC;color:#1E293B}
.nav-link.active{background:#EFF6FF;color:#185FA5;border-left-color:#185FA5;font-weight:500}
.nav-link i{font-size:15px;width:16px;text-align:center;flex-shrink:0}
.sb-footer{margin-top:auto;border-top:1px solid #E2E8F0;padding:14px 16px}
.sb-user{font-size:11px;color:#64748B;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Topbar pieces ───────────────────────────────────────── */
.page-title{font-size:15px;font-weight:600;color:#1E293B}
.topbar-actions{display:flex;align-items:center;gap:10px}
.clock-badge{font-size:11px;color:#94A3B8;font-variant-numeric:tabular-nums}

/* ── Cards ───────────────────────────────────────────────── */
.card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:18px 20px;margin-bottom:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13.5px;font-weight:600;color:#1E293B}
.card-actions{display:flex;align-items:center;gap:8px}

/* ── Metric cards ────────────────────────────────────────── */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.metric-card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:16px 18px}
.metric-label{font-size:11px;font-weight:500;color:#64748B;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:700;color:#1E293B;line-height:1}
.metric-sub{font-size:11px;color:#94A3B8;margin-top:5px}
.metric-value.blue{color:#185FA5}
.metric-value.green{color:#166534}
.metric-value.amber{color:#92400E}
.metric-value.red{color:#991B1B}

/* ── Buttons ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid #CBD5E1;
  border-radius:7px;background:#fff;cursor:pointer;font-size:12.5px;color:#374151;
  font-family:inherit;transition:background .12s,border-color .12s;white-space:nowrap}
.btn:hover{background:#F8FAFC;border-color:#94A3B8}
.btn:active{transform:scale(.98)}
.btn i{font-size:14px}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C;border-color:#0C447C}
.btn.success{background:#15803D;color:#fff;border-color:#15803D}
.btn.success:hover{background:#166534}
.btn.danger{background:#DC2626;color:#fff;border-color:#DC2626}
.btn.danger:hover{background:#B91C1C}
.btn.ghost{background:transparent;border-color:transparent;color:#185FA5}
.btn.ghost:hover{background:#EFF6FF}
.btn.sm{padding:4px 9px;font-size:11.5px}
.btn.sm i{font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Forms ───────────────────────────────────────────────── */
.form-grid{display:grid;gap:12px}
.form-grid.cols-2{grid-template-columns:1fr 1fr}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11.5px;font-weight:500;color:#374151}
.field input,.field select,.field textarea{
  font-family:inherit;font-size:12.5px;padding:7px 10px;
  border:1px solid #CBD5E1;border-radius:7px;
  background:#fff;color:#1E293B;width:100%;transition:border-color .12s}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.field input[readonly]{background:#F8FAFC;color:#64748B}
.field .hint{font-size:10.5px;color:#94A3B8}
.field .error-msg{font-size:11px;color:#DC2626}

/* ── Table ───────────────────────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{border-bottom:1px solid #E2E8F0}
th{text-align:left;padding:8px 10px;font-size:10.5px;font-weight:600;
   text-transform:uppercase;letter-spacing:.06em;color:#64748B;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #F1F5F9;color:#334155;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#F8FAFC}

/* ── Badges ──────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;
  border-radius:5px;font-size:10.5px;font-weight:600}
.badge.green{background:#DCFCE7;color:#166534}
.badge.red{background:#FEE2E2;color:#991B1B}
.badge.blue{background:#DBEAFE;color:#1E40AF}
.badge.amber{background:#FEF3C7;color:#92400E}
.badge.gray{background:#F1F5F9;color:#475569}
.badge.purple{background:#EDE9FE;color:#5B21B6}
.badge.dot::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block}

/* ── Alerts ──────────────────────────────────────────────── */
.alert{padding:10px 14px;border-radius:8px;font-size:12.5px;
  display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.alert i{font-size:15px;flex-shrink:0;margin-top:1px}
.alert.info{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.alert.success{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
.alert.warn{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.alert.danger{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}

/* ── Divider ─────────────────────────────────────────────── */
.divider{height:1px;background:#E2E8F0;margin:14px 0}

/* ── Mono text ───────────────────────────────────────────── */
.mono{font-family:'Courier New',monospace;font-size:11.5px}

/* ── Empty state ─────────────────────────────────────────── */
.empty-state{text-align:center;padding:48px 24px;color:#94A3B8}
.empty-state i{font-size:40px;display:block;margin-bottom:10px}
.empty-state p{font-size:13px}

/* ── Spinner ─────────────────────────────────────────────── */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #E2E8F0;
  border-top-color:#185FA5;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{display:flex;align-items:center;justify-content:center;
  padding:48px;color:#94A3B8;gap:10px;font-size:13px}

/* ── Receipt ─────────────────────────────────────────────── */
.receipt-sheet{background:#fff;border:1px solid #E2E8F0;border-radius:10px;
  padding:24px;max-width:400px;margin:0 auto;font-size:12.5px}
.receipt-header{text-align:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed #CBD5E1}
.receipt-biz{font-size:15px;font-weight:700;color:#1E293B}
.receipt-meta{font-size:11px;color:#64748B;margin-top:2px}
.receipt-row{display:flex;justify-content:space-between;padding:3px 0}
.receipt-total-row{display:flex;justify-content:space-between;padding:8px 0;
  font-size:14px;font-weight:700;border-top:1px solid #1E293B;margin-top:6px}

/* ── Chart bars ──────────────────────────────────────────── */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:130px;padding-bottom:28px;position:relative}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.bar-fill{width:100%;border-radius:3px 3px 0 0;transition:height .4s ease;min-height:2px}
.bar-lbl{font-size:9.5px;color:#94A3B8;margin-top:5px;white-space:nowrap;position:absolute;bottom:2px}
.bar-val{font-size:9px;color:#64748B;margin-bottom:3px}

/* ── Progress bar ────────────────────────────────────────── */
.progress-track{height:6px;border-radius:3px;background:#F1F5F9;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── Tabs ────────────────────────────────────────────────── */
.tab-bar{display:flex;border-bottom:1px solid #E2E8F0;margin-bottom:16px;gap:0}
.tab-item{padding:9px 16px;font-size:12.5px;cursor:pointer;color:#64748B;
  border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.tab-item:hover{color:#1E293B}
.tab-item.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}

/* ── Modal backdrop ──────────────────────────────────────── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:100;align-items:center;justify-content:center;padding:24px}
.modal-backdrop.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:500px;
  border:1px solid #E2E8F0;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:14px;font-weight:600}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid #E2E8F0}

/* ── Misc helpers ────────────────────────────────────────── */
.flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}
.justify-between{justify-content:space-between}.w-full{width:100%}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:#64748B}
.font-bold{font-weight:700}.font-medium{font-weight:500}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.text-right{text-align:right}.text-center{text-align:center}
.avatar{width:30px;height:30px;border-radius:50%;background:#DBEAFE;color:#1E40AF;
  display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex-shrink:0}

/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .form-grid.cols-2,.form-grid.cols-3{grid-template-columns:1fr}
  .metric-grid{grid-template-columns:1fr 1fr}
}

/* ── Print styles ────────────────────────────────────────── */
@media print{
  .sidebar,.topbar,.btn,.tab-bar,.card-actions{display:none!important}
  .page-content{padding:0}
  .card{border:none;box-shadow:none}
}
</style>
